// Attaches a fresh Firebase ID token to every Firestore REST call. getIdToken() returns a
// cached token and only hits the network to refresh it when it's close to expiring, so this
// is cheap to call before every request.
async function authedFetch(url, opts = {}) {
  const user = fbAuth.currentUser;
  const token = user ? await user.getIdToken() : null;
  const headers = { ...(opts.headers || {}), ...(token ? { Authorization: `Bearer ${token}` } : {}) };
  return fetch(url, { ...opts, headers });
}

const FIREBASE_PROJECT_ID = 'usus-9af65';
const FIRESTORE_DOC_URL = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/appState/main`;

let cloudWarned = false;

async function loadState() {
  if (cloudEnabled) {
    try {
      const res = await authedFetch(FIRESTORE_DOC_URL);
      if (res.ok) {
        const json = await res.json();
        const raw = json && json.fields && json.fields.json && json.fields.json.stringValue;
        if (raw) return JSON.parse(raw);
      } else if (res.status === 404) {
        // no cloud doc yet — fine, fall through to local
      } else {
        if (res.status === 401 || res.status === 403) cloudEnabled = false;
        if (!cloudWarned) { console.error('Firestore load failed with status', res.status, '— disabling cloud sync, using local storage only.'); cloudWarned = true; }
      }
    } catch (e) {
      if (!cloudWarned) { console.error('Firestore unreachable, using local storage', e); cloudWarned = true; }
    }
  }
  try {
    const local = localStorage.getItem(LOCAL_KEY);
    if (local) return JSON.parse(local);
  } catch (e) {}
  return null;
}

async function saveState(state) {
  try { localStorage.setItem(LOCAL_KEY, JSON.stringify(state)); } catch (e) { console.error('local save failed', e); }
  if (!cloudEnabled) return;
  try {
    const res = await authedFetch(`${FIRESTORE_DOC_URL}?updateMask.fieldPaths=json`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields: { json: { stringValue: JSON.stringify(state) } } })
    });
    if (!res.ok && (res.status === 401 || res.status === 403)) cloudEnabled = false;
  } catch (e) { /* safe locally regardless */ }
}

/* ---------------- photos (own Firestore collection — one small doc per photo, no shared 1MiB ceiling) ---------------- */
function photoDocUrl(id) {
  return `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/photos${id ? '/' + id : ''}`;
}
async function fetchPhotos() {
  if (!cloudEnabled) return null;
  try {
    const res = await authedFetch(photoDocUrl());
    if (!res.ok) return null;
    const json = await res.json();
    const docs = json.documents || [];
    return docs.map(d => {
      const id = d.name.split('/').pop();
      const f = d.fields || {};
      return {
        id,
        src: (f.src && f.src.stringValue) || '',
        date: (f.date && f.date.stringValue) || '',
        at: (f.at && f.at.stringValue) ? Number(f.at.stringValue) : null,
        caption: (f.caption && f.caption.stringValue) || ''
      };
    });
  } catch (e) { console.error('fetchPhotos failed', e); return null; }
}
async function createPhotoDoc(p) {
  const fields = { src: { stringValue: p.src || '' }, date: { stringValue: p.date || '' }, at: { stringValue: String(p.at || Date.now()) } };
  if (p.caption) fields.caption = { stringValue: p.caption };
  try {
    const res = await authedFetch(photoDocUrl(), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    if (!res.ok) throw new Error('create failed: ' + res.status);
    const json = await res.json();
    return json.name.split('/').pop();
  } catch (e) { console.error('createPhotoDoc failed', e); return null; }
}
/* ---------------- turn-based photobooth session (Firestore, polled) ---------------- */
// 3 rounds x 2 people = 6 shots total. The starter always lands in the odd slots (shot1,3,5)
// and their partner in the even slots (shot2,4,6), so each person keeps the same side
// (left/right) in every row of the final strip — like a real shared photobooth.
const PHOTOBOOTH_DOC_URL = `https://firestore.googleapis.com/v1/projects/${FIREBASE_PROJECT_ID}/databases/(default)/documents/photobooth/currentSession`;
const PHOTOBOOTH_SHOT_KEYS = ['shot1', 'shot2', 'shot3', 'shot4', 'shot5', 'shot6'];
async function fetchPhotoboothSession() {
  try {
    const res = await authedFetch(PHOTOBOOTH_DOC_URL);
    if (res.status === 404) return null;
    if (!res.ok) return { error: true, status: res.status };
    const json = await res.json();
    const f = json.fields || {};
    const session = {
      starter: (f.starter && f.starter.stringValue) || '',
      turn: (f.turn && f.turn.stringValue) || '',
      status: (f.status && f.status.stringValue) || 'waiting',
      stripUrl: (f.stripUrl && f.stripUrl.stringValue) || '',
      filter: (f.filter && f.filter.stringValue) || 'none'
    };
    PHOTOBOOTH_SHOT_KEYS.forEach(k => { session[k] = (f[k] && f[k].stringValue) || ''; });
    return session;
  } catch (e) { console.error('fetchPhotoboothSession failed', e); return { error: true, status: 0 }; }
}
async function writePhotoboothSession(session) {
  const fields = {
    starter: { stringValue: session.starter || '' },
    turn: { stringValue: session.turn || '' },
    status: { stringValue: session.status || 'waiting' },
    stripUrl: { stringValue: session.stripUrl || '' },
    filter: { stringValue: session.filter || 'none' }
  };
  PHOTOBOOTH_SHOT_KEYS.forEach(k => { fields[k] = { stringValue: session[k] || '' }; });
  try {
    // No updateMask — a plain PATCH replaces (and creates, if missing) the whole document.
    const res = await authedFetch(PHOTOBOOTH_DOC_URL, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
    if (!res.ok) return { error: true, status: res.status };
    return { error: false };
  } catch (e) { console.error('writePhotoboothSession failed', e); return { error: true, status: 0 }; }
}
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
async function buildPhotoStrip(rows, filterCss, leftName, rightName) {
  // rows: [[leftUrl, rightUrl], [leftUrl, rightUrl], [leftUrl, rightUrl]]
  const loadedRows = await Promise.all(rows.map(([l, r]) => Promise.all([loadImage(l), loadImage(r)])));
  const w = 560, pad = 20, gap = 14, colGap = 10, labelH = 26, footerH = 44;
  const colW = (w - pad * 2 - colGap) / 2;
  const rowH = colW * 0.75;
  const frameH = pad + labelH + (rowH + gap) * loadedRows.length - gap + footerH;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = frameH;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFF9EF';
  ctx.fillRect(0, 0, w, frameH);
  ctx.font = '600 15px "Patrick Hand", cursive';
  ctx.fillStyle = '#3A2E28';
  ctx.textAlign = 'center';
  ctx.fillText(leftName || '', pad + colW / 2, pad + 16);
  ctx.fillText(rightName || '', pad + colW + colGap + colW / 2, pad + 16);
  let y = pad + labelH;
  ctx.filter = filterCss && filterCss !== 'none' ? filterCss : 'none';
  loadedRows.forEach(([imgL, imgR]) => {
    ctx.drawImage(imgL, pad, y, colW, rowH);
    ctx.drawImage(imgR, pad + colW + colGap, y, colW, rowH);
    y += rowH + gap;
  });
  ctx.filter = 'none';
  ctx.fillStyle = '#A8536C';
  ctx.font = '600 22px "Caveat", cursive';
  ctx.fillText(`${leftName} & ${rightName} \u2022 Photobooth`, w / 2, frameH - 16);
  return canvas.toDataURL('image/jpeg', 0.92);
}
async function patchPhotoDoc(id, patch) {
  const keys = Object.keys(patch);
  if (!keys.length) return;
  const fields = {};
  keys.forEach(k => { fields[k] = { stringValue: String(patch[k]) }; });
  const mask = keys.map(k => `updateMask.fieldPaths=${encodeURIComponent(k)}`).join('&');
  try {
    await authedFetch(`${photoDocUrl(id)}?${mask}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fields })
    });
  } catch (e) { console.error('patchPhotoDoc failed', e); }
}

function formatTime12(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  const period = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${h12}:${String(m).padStart(2, '0')} ${period}`;
}

function compressImage(file, maxSize = 1400, quality = 0.85) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          if (width > height) { height = Math.round(height * maxSize / width); width = maxSize; }
          else { width = Math.round(width * maxSize / height); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

  if (!saved) return DEFAULT_TASKS;
  const savedTemplates = (saved.templates || []).filter(t => t.id !== 't6');
  const savedIds = new Set(savedTemplates.map(t => t.id));

function Btn({ children, onClick, variant = 'primary', style, type = 'button', disabled, rot }) {
  const base = {
    border: 'none',
    borderRadius: '18px 8px 18px 8px/8px 18px 8px 18px',
    padding: '11px 20px',
    fontSize: 15,
    fontWeight: 400,
    fontFamily: "'Patrick Hand', cursive",
    cursor: disabled ? 'default' : 'pointer',
    opacity: disabled ? 0.5 : 1,
    transform: `rotate(${rot != null ? rot : -1.2}deg)`
  };
  const variants = {
    primary: { background: C.ink, color: '#fff' },
    accent: { background: C.accent, color: '#fff' },
    ghost: { background: 'transparent', color: C.sub, border: `1.5px dashed ${C.faint}` },
    subtle: { background: C.paper, color: C.ink, border: `1.5px solid ${C.line}` }
  };
  return <button type={type} onClick={onClick} disabled={disabled} className="press hand-tilt"
    style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}

function Input(props) {

function SetupScreen({ onDone }) {
  const [nameA, setNameA] = useState('');
  const [nameB, setNameB] = useState('');
  const [togetherSince, setTogetherSince] = useState('');
  const canSubmit = nameA.trim() && nameB.trim() && togetherSince;
  const submit = e => {
    e.preventDefault();
    if (!canSubmit) return;
    onDone({ setupDone: true, nameA: nameA.trim(), nameB: nameB.trim(), togetherSince });
  };
  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, position: 'relative' }}>
      <AmbientBackground />
      <div className="fade-up" style={{ maxWidth: 400, width: '100%', position: 'relative', zIndex: 1 }}>

          <p style={{ color: C.sub, fontSize: 15, margin: '4px 0 0' }}>Just once — for the two of you</p>
        </div>
        <Paper rotate={-0.8} style={{ padding: 24 }}>
          <form onSubmit={submit} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ display: 'flex', gap: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'Indie Flower', fontSize: 14, color: C.sub, marginBottom: 4 }}>Your name</div>
                <Input value={nameA} onChange={e => setNameA(e.target.value)} placeholder="Name" />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: 'Indie Flower', fontSize: 14, color: C.sub, marginBottom: 4 }}>Their name</div>
                <Input value={nameB} onChange={e => setNameB(e.target.value)} placeholder="Name" />
              </div>
            </div>
            <div>
              <div style={{ fontFamily: 'Indie Flower', fontSize: 14, color: C.sub, marginBottom: 4 }}>Together since</div>

            <Btn type="submit" variant="accent" disabled={!canSubmit} style={{ width: '100%', marginTop: 6, padding: '13px 0' }} rot={0}>
              Continue
            </Btn>
          </form>
        </Paper>
      </div>
    </div>
  );
}

function Polaroid({ p, i, onOpen, onSaveCaption }) {
  const rot = (i % 2 === 0 ? -1 : 1) * (2 + (i * 7) % 5);
  const taped = i % 3 !== 1;
  const flowered = i % 4 === 2;
  return (
    <div className="polaroid" style={{
      '--rot': `${rot}deg`,
      background: '#fff', padding: '6px 6px 10px', borderRadius: 2,
      boxShadow: '0 3px 10px rgba(58,46,40,0.16)',
      transform: `rotate(${rot}deg)`, position: 'relative'
    }}>
      {taped && <Tape style={{ top: -10, left: '50%', marginLeft: -28, transform: 'rotate(-2deg)' }} />}
      {flowered && <div style={{ position: 'absolute', top: -14, right: -10 }}><Doodle type="flower" size={30} /></div>}
      <div onClick={onOpen} style={{ overflow: 'hidden', background: '#eee', aspectRatio: '1/1', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }}>
        <img src={p.src} alt="" style={{ width: '100%', height: '100%', objectFit: 'contain', display: 'block' }} />
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginTop: 8, padding: '0 2px' }}>

/* ============================================================= TOGETHER (tasks) */
function TaskRow({ t, completion, onComplete, onUpdate, onUncomplete, onRemove }) {
  const done = !!completion;
  const [open, setOpen] = useState(false);
  const [text, setText] = useState((completion && completion.answer) || '');
  const fileRef = useRef(null);

  const startEdit = () => { setText((completion && completion.answer) || ''); setOpen(true); };
  const toggleOpen = () => { done ? startEdit() : setOpen(o => !o); };
  const savePlain = () => { onComplete({}); setOpen(false); };
  const saveText = e => {
    e.preventDefault();
    if (!text.trim()) return;
    if (done) onUpdate({ answer: text.trim() }); else onComplete({ answer: text.trim() });
    setOpen(false);
  };
  const savePhoto = async file => {
    if (!file) return;
    const compressed = await compressImage(file, 900, 0.8);
    const src = await uploadToCloudinary(compressed);
    if (done) onUpdate({ photo: src }); else onComplete({ photo: src });
    setOpen(false);
  };

  return (
    <div style={{ padding: '14px 4px', borderBottom: `1px dashed ${C.line}` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
        <button onClick={() => done ? onUncomplete() : savePlain()} className="press" style={{
          width: 28, height: 28, minWidth: 28, borderRadius: '50%',
          border: done ? 'none' : `1.5px dashed ${C.faint}`, background: 'transparent',
          color: C.accent, fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer'
        }}>{done ? <span style={{ display: 'inline-block', animation: 'heartPop 0.3s ease' }}><Doodle type="heart" size={16} inline stroke={C.accent} /></span> : ''}</button>
        <div onClick={toggleOpen} style={{
          flex: 1, fontSize: 16, cursor: 'pointer',
          color: done ? C.faint : C.ink, textDecoration: done && !completion.answer && !completion.photo ? 'line-through' : 'none'
        }}>{t.text}</div>
        {done && (
          <button onClick={startEdit} className="press" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 2 }}>
            <Doodle type="pencil" size={14} inline stroke={C.sub} />
          </button>
        )}
        <button onClick={onRemove} className="press" style={{ background: 'none', border: 'none', color: C.faint, cursor: 'pointer', fontSize: 14 }}>✕</button>
      </div>

      {open && (
        <div className="fade-up" style={{ marginLeft: 40, marginTop: 10, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <form onSubmit={saveText} style={{ display: 'flex', gap: 8 }}>
            <Input autoFocus value={text} onChange={e => setText(e.target.value)} placeholder="Write something…" />
            <Btn type="submit" variant="subtle" rot={-1}>Save</Btn>
          </form>
          <div>
            <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => savePhoto(e.target.files[0])} />
            <Btn variant="ghost" onClick={() => fileRef.current && fileRef.current.click()} rot={1}>
              <Doodle type="camera" size={14} inline stroke={C.ink} /> {completion && completion.photo ? 'or replace the photo' : 'or add a photo instead'}
            </Btn>
          </div>
        </div>
      )}
      {!open && done && completion.answer && (
        <div style={{ marginLeft: 40, marginTop: 6, fontFamily: 'Shadows Into Light', fontSize: 17, color: C.accentDark }}>"{completion.answer}"</div>
      )}
      {!open && done && completion.photo && (
        <div style={{ marginLeft: 40, marginTop: 8 }}>
          <img src={completion.photo} alt="" style={{ width: 64, height: 64, objectFit: 'cover', borderRadius: 6, border: '3px solid #fff', boxShadow: '0 2px 6px rgba(0,0,0,0.15)' }} />
        </div>
      )}
    </div>
  );
}

/* ============================================================= REWARD WHEEL */
function RewardWheelModal({ options, spinsAvailable, onSpin, onClose, onAddOption, onRemoveOption }) {
  const [rotation, setRotation] = useState(0);
  const [spinning, setSpinning] = useState(false);
  const [result, setResult] = useState(null);
  const [newOption, setNewOption] = useState('');
  const wheelColors = [STICKY_COLORS[0], STICKY_COLORS[1], STICKY_COLORS[2], STICKY_COLORS[3], PAPER_TONES[1], PAPER_TONES[2]];
  const segAngle = 360 / options.length;
  const gradient = options.map((o, i) => `${wheelColors[i % wheelColors.length]} ${i * segAngle}deg ${(i + 1) * segAngle}deg`).join(', ');

  const spin = () => {
    if (spinsAvailable <= 0 || spinning) return;
    setResult(null);
    const extraTurns = 5 + Math.floor(Math.random() * 3);
    const randomOffset = Math.random() * 360;
    const newRotation = rotation + extraTurns * 360 + randomOffset;
    setRotation(newRotation);
    setSpinning(true);
    setTimeout(() => {
      const pointerAngle = (360 - (newRotation % 360) + 360) % 360;
      const index = Math.floor(pointerAngle / segAngle) % options.length;
      setResult(options[index]);
      setSpinning(false);
      onSpin(options[index]);
    }, 3200);
  };

  const addOption = e => {
    e.preventDefault();
    if (!newOption.trim()) return;
    onAddOption(newOption.trim());
    setNewOption('');
  };

  return (
    <div className="fade-in" onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(58,46,40,0.35)', zIndex: 60, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 }}>
      <div onClick={e => e.stopPropagation()} style={{ background: C.paper, borderRadius: 20, padding: 24, maxWidth: 420, width: '100%', boxShadow: '0 20px 50px rgba(0,0,0,0.25)', textAlign: 'center', position: 'relative' }}>
        <button onClick={onClose} className="press" style={{ position: 'absolute', top: 12, right: 12, background: 'none', border: 'none', cursor: 'pointer', color: C.sub, fontSize: 18 }}>✕</button>
        <h3 style={{ fontFamily: 'Caveat', fontSize: 26, fontWeight: 700, margin: '0 0 16px', color: C.ink }}>Spin for a reward</h3>
        <div style={{ position: 'relative', width: 240, height: 240, margin: '0 auto 20px' }}>
          <div style={{ position: 'absolute', top: -10, left: '50%', marginLeft: -10, width: 0, height: 0, borderLeft: '10px solid transparent', borderRight: '10px solid transparent', borderTop: `16px solid ${C.accentDark}`, zIndex: 2 }} />
          <div style={{
            width: 240, height: 240, borderRadius: '50%', position: 'relative', overflow: 'hidden',
            background: `conic-gradient(${gradient})`,
            transform: `rotate(${rotation}deg)`, transition: spinning ? 'transform 3.2s cubic-bezier(.17,.67,.32,1.01)' : 'none',
            border: '4px solid #fff', boxShadow: '0 4px 16px rgba(58,46,40,0.25)'
          }}>
            {options.map((o, i) => {
              const mid = i * segAngle + segAngle / 2;
              return (
                <div key={i} style={{ position: 'absolute', inset: 0, transform: `rotate(${mid}deg)`, pointerEvents: 'none' }}>
                  <div style={{
                    position: 'absolute', top: 14, left: '50%', width: 84, transform: 'translateX(-50%)',
                    fontSize: 11, lineHeight: 1.15, fontFamily: "'Patrick Hand', cursive", color: C.ink,
                    textAlign: 'center', overflowWrap: 'break-word'
                  }}>{o}</div>
                </div>
              );
            })}
          </div>
        </div>
        {result && <div className="fade-up" style={{ fontFamily: 'Shadows Into Light', fontSize: 22, color: C.accentDark, marginBottom: 14 }}>{result}!</div>}
        <Btn variant="accent" onClick={spin} disabled={spinsAvailable <= 0 || spinning} rot={0}>
          {spinning ? 'Spinning…' : `Spin (${spinsAvailable} available)`}
        </Btn>
        <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, justifyContent: 'center', marginTop: 18 }}>
          {options.map((o, i) => (
            <span key={i} style={{
              display: 'inline-flex', alignItems: 'center', gap: 5, border: `1.5px solid ${C.line}`, background: '#fff',
              borderRadius: 999, padding: '5px 6px 5px 10px', fontSize: 12.5, fontFamily: "'Patrick Hand', cursive", color: C.ink
            }}>
              {o}
              <button onClick={() => onRemoveOption(i)} disabled={options.length <= 1} title="Remove" className="press" style={{
                border: 'none', background: 'none', color: C.faint, cursor: options.length <= 1 ? 'default' : 'pointer', fontSize: 12, display: 'flex', padding: 0
              }}>✕</button>
            </span>
          ))}
        </div>
        <form onSubmit={addOption} style={{ display: 'flex', gap: 8, marginTop: 10 }}>
          <Input value={newOption} onChange={e => setNewOption(e.target.value)} placeholder="Add your own reward…" />
          <Btn type="submit" variant="subtle" rot={-1}>Add</Btn>
        </form>
      </div>
    </div>
  );
}

function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) { h = (h * 31 + s.charCodeAt(i)) | 0; } return h; }
function seededRandom(seed) { const x = Math.sin(seed) * 10000; return x - Math.floor(x); }
function dailyTasks(templates) {
  return templates.slice(0, 3);
}

function TogetherPage({ tasksData, setTasksData, activeUser, rewards, setRewards }) {
  const [customText, setCustomText] = useState('');
  const [showWheel, setShowWheel] = useState(false);
  const today = todayStr();
  const todaysCompletions = tasksData.completions[today] || {};

  const completeTask = (taskId, extra) => {
    const next = { ...tasksData, completions: { ...tasksData.completions } };
    const day = { ...(next.completions[today] || {}) };
    day[taskId] = { by: activeUser, at: Date.now(), ...(extra || {}) };
    next.completions[today] = day;
    setTasksData(next);
    setRewards(r => {
      const progress = (r.progress || 0) + 1;
      if (progress >= 7) {
        const spins = { ...(r.spins || {}) };
        spins[activeUser] = (spins[activeUser] || 0) + 1;
        return { ...r, spins, progress: 0 };
      }
      return { ...r, progress };
    });
  };
  const uncompleteTask = taskId => {
    const next = { ...tasksData, completions: { ...tasksData.completions } };
    const day = { ...(next.completions[today] || {}) };
    delete day[taskId];
    next.completions[today] = day;
    setTasksData(next);
  };
  const updateTask = (taskId, extra) => {
    const next = { ...tasksData, completions: { ...tasksData.completions } };
    const day = { ...(next.completions[today] || {}) };
    day[taskId] = { ...(day[taskId] || { by: activeUser, at: Date.now() }), ...extra };
    next.completions[today] = day;
    setTasksData(next);
  };
  const addTemplate = e => {
    e.preventDefault();
    if (!customText.trim()) return;
    setTasksData({ ...tasksData, templates: [{ id: uid(), text: customText.trim() }, ...tasksData.templates] });
    setCustomText('');
  };
  const removeTemplate = id => setTasksData({ ...tasksData, templates: tasksData.templates.filter(t => t.id !== id) });
  const todaysTasks = dailyTasks(tasksData.templates);
  const doneCount = todaysTasks.filter(t => todaysCompletions[t.id]).length;
  const allDone = todaysTasks.length > 0 && doneCount === todaysTasks.length;

  const options = (rewards.options && rewards.options.length) ? rewards.options : DEFAULT_REWARD_OPTIONS;
  const mySpins = (rewards.spins && rewards.spins[activeUser]) || 0;
  const progress = rewards.progress || 0;
  const onSpin = result => {
    setRewards(r => ({
      ...r,
      spins: { ...(r.spins || {}), [activeUser]: Math.max(0, ((r.spins || {})[activeUser] || 0) - 1) },
      log: [...(r.log || []), { id: uid(), by: activeUser, result, at: Date.now() }]
    }));
  };
  const onAddOption = text => setRewards(r => ({ ...r, options: [...(r.options && r.options.length ? r.options : DEFAULT_REWARD_OPTIONS), text] }));
  const onRemoveOption = index => setRewards(r => {
    const current = (r.options && r.options.length) ? r.options : DEFAULT_REWARD_OPTIONS;
    if (current.length <= 1) return r;
    return { ...r, options: current.filter((_, i) => i !== index) };
  });

  return (
    <div style={{ maxWidth: 520, margin: '0 auto', padding: '32px 20px 40px' }}>
      <div style={{ marginBottom: 18 }}>
        <div style={{ fontFamily: 'Indie Flower', fontSize: 13, color: C.faint, letterSpacing: 0.5 }}>TODAY, TOGETHER</div>
        <h2 style={{ fontFamily: 'Caveat', fontSize: 30, fontWeight: 700, margin: '2px 0 0', color: C.ink }}>A few small things</h2>
        <p style={{ fontSize: 14, color: C.sub, margin: '4px 0 0' }}>{doneCount} of {todaysTasks.length} done · as {activeUser}</p>
        <p style={{ fontSize: 13, color: C.faint, margin: '2px 0 0' }}>Today's 3 · tap a task to write something or attach a photo.</p>
      </div>

      <Paper torn tone={2} rotate={-0.4} style={{ padding: '4px 18px', position: 'relative' }}>
        {allDone && (
          <div aria-hidden="true" style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
            {['20%', '40%', '60%', '80%'].map((l, i) => (
              <div key={i} style={{ position: 'absolute', bottom: 10, left: l, animation: `sparkleUp ${1 + i * 0.15}s ease-out ${i * 0.1}s` }}><Doodle type={i % 2 ? 'star' : 'heart'} size={16} inline /></div>
            ))}
          </div>
        )}
        {todaysTasks.map(t => (
          <TaskRow key={t.id} t={t} completion={todaysCompletions[t.id]}
            onComplete={extra => completeTask(t.id, extra)} onUpdate={extra => updateTask(t.id, extra)} onUncomplete={() => uncompleteTask(t.id)}
            onRemove={() => removeTemplate(t.id)} />
        ))}
        {todaysTasks.length === 0 && <div style={{ padding: '20px 4px', color: C.sub, fontSize: 15 }}>No tasks yet.</div>}
      </Paper>

      <form onSubmit={addTemplate} style={{ display: 'flex', gap: 8, marginTop: 16 }}>
        <Input value={customText} onChange={e => setCustomText(e.target.value)} placeholder="Add something…" />
        <Btn type="submit" variant="subtle" rot={-1}>Add</Btn>
      </form>

      <div style={{ marginTop: 30, textAlign: 'center' }}>
        <div style={{ fontFamily: 'Indie Flower', fontSize: 13, color: C.faint, marginBottom: 10 }}>REWARD WHEEL</div>
        <button onClick={() => mySpins > 0 && setShowWheel(true)} className="press" style={{
          display: 'inline-flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4,
          width: 104, height: 104, borderRadius: '50%', cursor: mySpins > 0 ? 'pointer' : 'default',

function RosterScanner({ onShifts }) {
  const fileRef = useRef(null);
  const [busy, setBusy] = useState(false);
  const [msg, setMsg] = useState('');

  const handleFile = async file => {
    if (!file) return;
    setBusy(true); setMsg('');
    try {
      const dataUrl = await compressImage(file, 1200, 0.8);
      const match = dataUrl.match(/^data:(.+);base64,(.+)$/);
      if (!match) throw new Error('bad image');
      const mediaType = match[1], data = match[2];
      const year = new Date().getFullYear();
      const prompt = `This image shows a work roster or shift schedule. Extract every shift you can find. Respond with ONLY a JSON array, nothing else, no markdown fences. Each item: {"date":"YYYY-MM-DD","time":"e.g. 9:00 AM - 5:00 PM","label":"optional role or note"}. Assume the year ${year} if no year is visible. Skip anything you can't confidently read.`;
      const resText = await window.claude.complete({
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: mediaType, data } },
            { type: 'text', text: prompt }
          ]
        }]
      });
      const jsonStr = (resText.match(/\[[\s\S]*\]/) || [null])[0];
      if (!jsonStr) throw new Error('no json found');
      const shifts = JSON.parse(jsonStr);
      if (!Array.isArray(shifts) || shifts.length === 0) throw new Error('no shifts');
      onShifts(shifts);
      setMsg(`Added ${shifts.length} shift${shifts.length > 1 ? 's' : ''} to the calendar.`);
    } catch (e) {
      console.error('roster scan failed', e);
      setMsg("Couldn't read that roster — try a clearer photo.");
    }
    setBusy(false);
  };

  return (
    <Paper rotate={-0.5} tone={1} style={{ padding: 16, marginBottom: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 10 }}>
        <div>
          <div style={{ fontFamily: 'Indie Flower', fontSize: 13, color: C.faint }}>ROSTER SCANNER</div>
          <div style={{ fontSize: 15, color: C.ink, marginTop: 2 }}>Snap a photo of your work roster — we'll add the shifts</div>
        </div>
        <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={e => handleFile(e.target.files[0])} />
        <Btn variant="subtle" onClick={() => fileRef.current && fileRef.current.click()} disabled={busy} rot={-1}>
          <Doodle type="camera" size={15} inline stroke={C.ink} /> {busy ? 'Reading…' : 'Scan Roster'}
        </Btn>
      </div>
      {msg && <div style={{ marginTop: 10, fontSize: 14, color: C.sub }}>{msg}</div>}
    </Paper>
  );
}

function CalendarView({ plans, config }) {
  const [monthOffset, setMonthOffset] = useState(0);
  const [selectedDate, setSelectedDate] = useState(null);
  const now = new Date();
  const viewDate = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const monthLabel = viewDate.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
  const dateStr = d => `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

  const shiftsByPerson = {};
  const rangeByPerson = {};
  const entriesByDate = {};
  const planEntriesByDate = {};
  plans.filter(p => p.type === 'shift' && p.date && p.by).forEach(p => {
    if (!shiftsByPerson[p.by]) shiftsByPerson[p.by] = new Set();
    shiftsByPerson[p.by].add(p.date);
    if (!rangeByPerson[p.by]) rangeByPerson[p.by] = { min: p.date, max: p.date };
    else {
      if (p.date < rangeByPerson[p.by].min) rangeByPerson[p.by].min = p.date;
      if (p.date > rangeByPerson[p.by].max) rangeByPerson[p.by].max = p.date;
    }
    if (!entriesByDate[p.date]) entriesByDate[p.date] = [];
    entriesByDate[p.date].push(p);
  });
  plans.filter(p => p.type !== 'shift' && p.date).forEach(p => {
    if (!planEntriesByDate[p.date]) planEntriesByDate[p.date] = [];
    planEntriesByDate[p.date].push(p);
  });

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const selEntries = selectedDate ? (entriesByDate[selectedDate] || []) : [];
  const selPlans = selectedDate ? (planEntriesByDate[selectedDate] || []) : [];
  const selAWorking = selectedDate && shiftsByPerson[config.nameA] && shiftsByPerson[config.nameA].has(selectedDate);
  const selBWorking = selectedDate && shiftsByPerson[config.nameB] && shiftsByPerson[config.nameB].has(selectedDate);
  const selAKnown = selectedDate && rangeByPerson[config.nameA] && selectedDate >= rangeByPerson[config.nameA].min && selectedDate <= rangeByPerson[config.nameA].max;
  const selBKnown = selectedDate && rangeByPerson[config.nameB] && selectedDate >= rangeByPerson[config.nameB].min && selectedDate <= rangeByPerson[config.nameB].max;
  const selBothOff = selAKnown && selBKnown && !selAWorking && !selBWorking;

  return (
    <Paper rotate={0.3} tone={0} style={{ padding: 16, marginBottom: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <button onClick={() => setMonthOffset(m => m - 1)} className="press" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: C.ink }}>‹</button>
        <div style={{ fontFamily: 'Caveat', fontSize: 22, fontWeight: 700, color: C.ink }}>{monthLabel}</div>
        <button onClick={() => setMonthOffset(m => m + 1)} className="press" style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 20, color: C.ink }}>›</button>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 4 }}>
        {['S', 'M', 'T', 'W', 'T', 'F', 'S'].map((d, i) => (
          <div key={i} style={{ textAlign: 'center', fontSize: 11, color: C.faint, fontFamily: 'Indie Flower' }}>{d}</div>
        ))}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
        {cells.map((d, i) => {
          if (d == null) return <div key={i} />;
          const ds = dateStr(d);
          const aSet = shiftsByPerson[config.nameA];
          const bSet = shiftsByPerson[config.nameB];
          const aWorking = aSet && aSet.has(ds);
          const bWorking = bSet && bSet.has(ds);
          const aRange = rangeByPerson[config.nameA];
          const bRange = rangeByPerson[config.nameB];
          const aKnown = aRange && ds >= aRange.min && ds <= aRange.max;
          const bKnown = bRange && ds >= bRange.min && ds <= bRange.max;
          const bothOff = aKnown && bKnown && !aWorking && !bWorking;
          const someoneWorking = aWorking || bWorking;
          const hasPlan = !!(planEntriesByDate[ds] && planEntriesByDate[ds].length);
          const isToday = ds === todayStr();
          const isSelected = ds === selectedDate;
          return (
            <div key={i} onClick={() => setSelectedDate(s => s === ds ? null : ds)} style={{
              aspectRatio: '1/1', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
              borderRadius: 8, background: isSelected ? C.accent : isToday ? C.accentSoft : 'transparent', gap: 1, cursor: 'pointer', position: 'relative'
            }}>
              {hasPlan && (
                <div style={{ position: 'absolute', top: 2, right: 2 }}>
                  <Doodle type="check" size={10} inline stroke={isSelected ? '#fff' : '#5a9c6e'} />
                </div>
              )}
              <div style={{ fontSize: 13, color: isSelected ? '#fff' : C.ink }}>{d}</div>
              {bothOff ? <Doodle type="heart" size={13} inline stroke={isSelected ? '#fff' : C.accent} /> :
                someoneWorking ? <Doodle type="cross" size={11} inline stroke={isSelected ? '#fff' : C.faint} /> : <div style={{ height: 13 }} />}
            </div>
          );
        })}
      </div>
      {selectedDate && (
        <div className="fade-up" style={{ marginTop: 12, padding: '10px 12px', borderRadius: 10, background: C.accentSoft, fontSize: 14, color: C.ink }}>
          <div style={{ fontFamily: 'Indie Flower', fontSize: 12, color: C.sub, marginBottom: 4 }}>
            {new Date(selectedDate + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' })}
          </div>
          {selPlans.map(pl => (
            <div key={pl.id}><Doodle type="check" size={12} inline stroke="#5a9c6e" /> {pl.text}{pl.time ? ' · ' + formatTime12(pl.time) : ''}</div>
          ))}
          {selEntries.length > 0 ? (
            selEntries.map(en => (
              <div key={en.id}>{en.by} — {en.label || 'Shift'}</div>
            ))
          ) : selBothOff ? (
            <div>Both of you are off today 💕</div>
          ) : selPlans.length === 0 ? (
            <div style={{ color: C.sub }}>No shifts logged for this day yet.</div>
          ) : null}
        </div>
      )}
      <div style={{ display: 'flex', gap: 16, marginTop: 12, fontSize: 12, color: C.sub, flexWrap: 'wrap' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Doodle type="cross" size={12} inline stroke={C.faint} /> one of us is working</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Doodle type="heart" size={12} inline stroke={C.accent} /> day off together</div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}><Doodle type="check" size={12} inline stroke="#5a9c6e" /> we have plans that day</div>
      </div>
    </Paper>
  );
}

function QuickCamera({ addPhoto, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [error, setError] = useState('');
  const [shot, setShot] = useState(null);
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => { streamRef.current = stream; if (videoRef.current) videoRef.current.srcObject = stream; })
      .catch(() => setError('Camera access was blocked or unavailable.'));
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const capture = () => {
    if (!videoRef.current) return;
    const video = videoRef.current;
    const canvas = document.createElement('canvas');
    canvas.width = 400; canvas.height = 300;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    setShot(canvas.toDataURL('image/jpeg', 0.9));
  };
  const save = async () => {
    try {
      const url = await uploadToCloudinary(shot);
      addPhoto({ src: url, date: todayStr(), at: Date.now() });
    } catch (e) { console.error('upload failed', e); }
    setSaved(true);
    setTimeout(onClose, 700);
  };

  return (
    <div>
      <div style={{ position: 'relative', borderRadius: '18px 8px 18px 8px/8px 18px 8px 18px', overflow: 'hidden', background: '#000', aspectRatio: '4/3', border: `3px solid ${C.ink}`, transform: 'rotate(0.5deg)' }}>
        {error ? (
          <div style={{ color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', fontSize: 14, padding: 20, textAlign: 'center' }}>{error}</div>
        ) : shot ? (
          <img src={shot} alt="" style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
        ) : (
          <video ref={videoRef} autoPlay playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover', transform: 'scaleX(-1)' }} />
        )}
      </div>
      <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
        {shot ? (
          <React.Fragment>
            <Btn variant="subtle" onClick={() => setShot(null)} disabled={saved} style={{ flex: 1 }} rot={-1}>Retake</Btn>
            <Btn variant="accent" onClick={save} disabled={saved} style={{ flex: 1 }} rot={1}>
              {saved ? <React.Fragment>Saved <Doodle type="check" size={13} inline stroke="#fff" /></React.Fragment> : 'Save to wall'}
            </Btn>
          </React.Fragment>
        ) : (
          <Btn variant="accent" onClick={capture} disabled={!!error} style={{ flex: 1 }} rot={-1}><Doodle type="camera" size={15} inline stroke="#fff" /> Take Photo</Btn>
        )}
      </div>
    </div>
  );
}

const PHOTO_FILTERS = [
  { key: 'none', label: 'Normal', css: 'none' },
  { key: 'bw', label: 'Black & White', css: 'grayscale(1) contrast(1.1)' },
  { key: 'retro', label: 'Retro', css: 'sepia(0.4) saturate(1.3) contrast(0.95) brightness(1.05) hue-rotate(-6deg)' }
];
function bakeFilter(src, css) {
  return new Promise(resolve => {
    if (!css || css === 'none') { resolve(src); return; }
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.filter = css;
      ctx.drawImage(img, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.9));
    };
    img.onerror = () => resolve(src);
    img.src = src;
  });
}
function Photobooth({ addPhoto, onClose }) {
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const [shots, setShots] = useState([]);
  const [error, setError] = useState('');
  const [saved, setSaved] = useState(false);
  const [filter, setFilter] = useState('none');
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => { streamRef.current = stream; if (videoRef.current) videoRef.current.srcObject = stream; })
      .catch(() => setError('Camera access was blocked or unavailable.'));
    return () => { if (streamRef.current) streamRef.current.getTracks().forEach(t => t.stop()); };
  }, []);

  const capture = () => {
    if (!videoRef.current) return;
    const video = videoRef.current;
    const canvas = document.createElement('canvas');
    canvas.width = 400; canvas.height = 300;
    const ctx = canvas.getContext('2d');
    ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    setShots(s => [...s, canvas.toDataURL('image/jpeg', 0.9)].slice(0, 4));
  };
  const activeFilter = PHOTO_FILTERS.find(f => f.key === filter) || PHOTO_FILTERS[0];
  const saveStrip = async () => {
    setSaving(true);
    for (const src of shots) {
      const finalSrc = await bakeFilter(src, activeFilter.css);
      try {
        const url = await uploadToCloudinary(finalSrc);
        addPhoto({ src: url, date: todayStr(), at: Date.now() });
      } catch (e) { console.error('upload failed', e); }
    }
    setSaving(false);
    setSaved(true);
    setTimeout(onClose, 900);
  };

  return (
    <div>
      <div style={{ position: 'relative', borderRadius: '18px 8px 18px 8px/8px 18px 8px 18px', overflow: 'hidden', background: '#000', aspectRatio: '4/3', border: `3px solid ${C.ink}`, transform: 'rotate(-0.5deg)' }}>
        {error ? (
          <div style={{ color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', fontSize: 14, padding: 20, textAlign: 'center' }}>{error}</div>
        ) : (
          <video ref={videoRef} autoPlay playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover', transform: 'scaleX(-1)', filter: activeFilter.css }} />
        )}
      </div>
      <div style={{ display: 'flex', gap: 8, marginTop: 12 }}>
        {[0, 1, 2, 3].map(i => (
          <div key={i} style={{
            flex: 1, aspectRatio: '4/3', borderRadius: '12px 6px 12px 6px/6px 12px 6px 12px', overflow: 'hidden',
            background: shots[i] ? `url(${shots[i]})` : C.accentSoft,
            backgroundSize: 'cover', backgroundPosition: 'center', border: `2px solid ${C.line}`,
            transform: `rotate(${(i % 2 ? 1 : -1) * 1}deg)`,
            filter: shots[i] ? activeFilter.css : 'none'
          }} />
        ))}
      </div>
      <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
        <Btn variant="subtle" onClick={capture} disabled={shots.length >= 4 || !!error} style={{ flex: 1 }} rot={-1}><Doodle type="camera" size={15} inline stroke={C.ink} /> Capture ({shots.length}/4)</Btn>
      </div>
      {shots.length === 4 && (
        <div style={{ marginTop: 16 }} className="fade-up">
          <div style={{ fontFamily: 'Indie Flower', fontSize: 13, color: C.faint, marginBottom: 8 }}>PICK A FILTER FOR YOUR REEL</div>
          <div style={{ display: 'flex', gap: 10, overflowX: 'auto', paddingBottom: 4 }}>
            {PHOTO_FILTERS.map(f => (
              <button key={f.key} onClick={() => setFilter(f.key)} className="press" style={{
                border: 'none', background: 'none', cursor: 'pointer', flexShrink: 0,
                display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5
              }}>
                <div style={{
                  width: 52, height: 52, borderRadius: '10px 4px 10px 4px/4px 10px 4px 10px', overflow: 'hidden',
                  background: `url(${shots[0]})`, backgroundSize: 'cover', backgroundPosition: 'center',
                  filter: f.css, border: filter === f.key ? `2.5px solid ${C.accent}` : `1.5px solid ${C.line}`
                }} />
                <div style={{ fontFamily: "'Patrick Hand', cursive", fontSize: 12, color: filter === f.key ? C.ink : C.faint }}>{f.label}</div>
              </button>
            ))}
          </div>
        </div>
      )}
      <div style={{ display: 'flex', gap: 10, marginTop: 14 }}>
        <Btn variant="accent" onClick={saveStrip} disabled={shots.length < 4 || saved || saving} style={{ flex: 1 }} rot={1}>
          {saved ? <React.Fragment>Saved <Doodle type="check" size={13} inline stroke="#fff" /></React.Fragment> : (saving ? 'Saving…' : 'Save to wall')}
        </Btn>
      </div>
    </div>
  );
}

/* ============================================================= TURN-BASED PHOTOBOOTH */
function TurnPhotobooth({ activeUser, config, addPhoto, onClose }) {
  const [session, setSession] = useState(undefined); // undefined = loading
  const [error, setError] = useState('');
  const [connError, setConnError] = useState(false);
  const [working, setWorking] = useState(false);
  const [pickedFilter, setPickedFilter] = useState('none');
  const videoRef = useRef(null);
  const streamRef = useRef(null);
  const myKey = (activeUser || '').toLowerCase();
  const nameForKey = key => [config.nameA, config.nameB].find(n => n && n.toLowerCase() === key) || (key ? key[0].toUpperCase() + key.slice(1) : '');
  const otherOf = key => {
    const a = (config.nameA || '').toLowerCase(), b = (config.nameB || '').toLowerCase();
    return key === a ? b : a;
  };

  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      const s = await fetchPhotoboothSession();
      if (cancelled) return;
      if (s && s.error) { setConnError(true); return; } // keep last-known session, don't stomp it
      setConnError(false);
      setSession(s);
    };
    poll();
    const t = setInterval(poll, 1500);
    return () => { cancelled = true; clearInterval(t); };
  }, []);

  // A session missing `starter` predates this 3-round/6-shot schema (e.g. an old doc from
  // before this rewrite) — treat it as if no session exists rather than trying to resume it.
  const validSession = session && session.starter ? session : (session ? null : session);
  const active = validSession && validSession.status === 'in_progress';
  const isMyTurn = active && validSession.turn === myKey;

  useEffect(() => {
    if (isMyTurn && !working) {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
        .then(stream => { streamRef.current = stream; if (videoRef.current) videoRef.current.srcObject = stream; })
        .catch(() => setError('Camera access was blocked or unavailable.'));
    }
    return () => { if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; } };
  }, [isMyTurn, working]);

  const startSession = async () => {
    const fresh = { starter: myKey, turn: myKey, status: 'in_progress', stripUrl: '', filter: pickedFilter };
    PHOTOBOOTH_SHOT_KEYS.forEach(k => { fresh[k] = ''; });
    setSession(fresh);
    const res = await writePhotoboothSession(fresh);
    if (res.error) setConnError(true);
  };

  const capture = async () => {
    if (!videoRef.current || working) return;
    setWorking(true); setError('');
    try {
      const video = videoRef.current;
      const canvas = document.createElement('canvas');
      canvas.width = 480; canvas.height = 360;
      const ctx = canvas.getContext('2d');
      ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      const url = await uploadToCloudinary(dataUrl);

      const nextIdx = PHOTOBOOTH_SHOT_KEYS.findIndex(k => !session[k]);
      const updated = { ...session, [PHOTOBOOTH_SHOT_KEYS[nextIdx]]: url };
      const allFilled = PHOTOBOOTH_SHOT_KEYS.every(k => updated[k]);

      if (allFilled) {
        if (streamRef.current) { streamRef.current.getTracks().forEach(t => t.stop()); streamRef.current = null; }
        const activeFilter = (PHOTO_FILTERS.find(f => f.key === updated.filter) || PHOTO_FILTERS[0]).css;
        const leftName = nameForKey(updated.starter);
        const rightName = nameForKey(otherOf(updated.starter));
        const rows = [[updated.shot1, updated.shot2], [updated.shot3, updated.shot4], [updated.shot5, updated.shot6]];
        const stripDataUrl = await buildPhotoStrip(rows, activeFilter, leftName, rightName);
        const stripUrl = await uploadToCloudinary(stripDataUrl);
        addPhoto({ src: stripUrl, date: todayStr(), at: Date.now(), caption: `Photobooth strip — ${leftName} & ${rightName}` });
        const done = { ...updated, turn: '', status: 'complete', stripUrl };
        setSession(done);
        const res = await writePhotoboothSession(done);
        if (res.error) setConnError(true);
      } else {
        const nextOwner = (nextIdx + 1) % 2 === 0 ? updated.starter : otherOf(updated.starter);
        const next = { ...updated, turn: nextOwner, status: 'in_progress' };
        setSession(next);
        const res = await writePhotoboothSession(next);
        if (res.error) setConnError(true);
      }
    } catch (e) {
      console.error('turn photobooth capture failed', e);
      setError("Couldn't save that photo — try again.");
    }
    setWorking(false);
  };

  const takenThumbs = validSession ? PHOTOBOOTH_SHOT_KEYS.map(k => validSession[k]).filter(Boolean) : [];
  const roundNum = Math.floor(takenThumbs.length / 2) + 1;

  return (
    <div style={{ textAlign: 'center' }}>
      {connError && (
        <div style={{ background: '#FDEDEC', border: '1.5px solid #E0938C', borderRadius: 10, padding: '8px 12px', marginBottom: 12, fontSize: 13, color: '#8A4A45', fontFamily: "'Patrick Hand', cursive" }}>
          Can't reach the shared session right now — this usually means the Firestore rules haven't been updated for the "photobooth" collection yet. Ask whoever set up the app to add that rule.
        </div>
      )}
      <div style={{ display: 'flex', justifyContent: 'center', gap: 6, marginBottom: 14 }}>
        {[0, 1, 2].map(i => (
          <Doodle key={i} type="star" size={16} inline stroke={takenThumbs.length >= (i + 1) * 2 ? C.accent : C.line} />
        ))}
      </div>

      {session === undefined && (
        <div style={{ padding: '30px 10px', color: C.sub, fontFamily: "'Patrick Hand', cursive", fontSize: 15 }}>Loading session…</div>
      )}

      {session !== undefined && (!validSession || (validSession.status !== 'in_progress' && validSession.status !== 'complete')) && (
        <div style={{ padding: '10px 4px' }}>
          <Doodle type="photobooth" size={40} inline stroke={C.accentDark} />
          <p style={{ fontFamily: "'Patrick Hand', cursive", fontSize: 16, color: C.ink, margin: '10px 0 16px' }}>
            3 rounds, one photo each — side by side, just like a real photobooth strip.
          </p>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'center', marginBottom: 18 }}>
            {PHOTO_FILTERS.map(f => (
              <button key={f.key} onClick={() => setPickedFilter(f.key)} className="press" style={{
                border: pickedFilter === f.key ? `2px solid ${C.accent}` : `1.5px solid ${C.line}`,
                background: pickedFilter === f.key ? '#fff' : C.paper, borderRadius: 999, padding: '6px 12px',
                fontSize: 13, fontFamily: "'Patrick Hand', cursive", color: C.ink, cursor: 'pointer'
              }}>{f.label}</button>
            ))}
          </div>
          <Btn variant="accent" onClick={startSession} rot={-1}>Start a new session</Btn>
        </div>
      )}

      {active && takenThumbs.length < 6 && (
        <div>
          <div style={{ fontFamily: 'Indie Flower', fontSize: 12, color: C.faint, marginBottom: 6 }}>ROUND {Math.min(roundNum, 3)} OF 3</div>
          {isMyTurn ? (
            <React.Fragment>
              <div className="fade-up" style={{ fontFamily: 'Caveat', fontSize: 22, fontWeight: 700, color: C.accentDark, marginBottom: 10 }}>
                Your turn — Take Photo 📸
              </div>
              <div style={{ position: 'relative', borderRadius: '18px 8px 18px 8px/8px 18px 8px 18px', overflow: 'hidden', background: '#000', aspectRatio: '4/3', border: `3px solid ${C.ink}`, transform: 'rotate(0.5deg)', filter: (PHOTO_FILTERS.find(f => f.key === validSession.filter) || PHOTO_FILTERS[0]).css }}>
                {error ? (
                  <div style={{ color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', height: '100%', fontSize: 14, padding: 20, textAlign: 'center' }}>{error}</div>
                ) : (
                  <video ref={videoRef} autoPlay playsInline muted style={{ width: '100%', height: '100%', objectFit: 'cover', transform: 'scaleX(-1)' }} />
                )}
              </div>
              <Btn variant="accent" onClick={capture} disabled={!!error || working} style={{ width: '100%', marginTop: 14 }} rot={-1}>
                {working ? 'Saving…' : <React.Fragment><Doodle type="camera" size={15} inline stroke="#fff" /> Take Photo</React.Fragment>}
              </Btn>
            </React.Fragment>
          ) : (
            <div className="fade-up" style={{ padding: '30px 10px' }}>
              <Doodle type="zzz" size={34} inline stroke={C.faint} />
              <p style={{ fontFamily: "'Patrick Hand', cursive", fontSize: 16, color: C.sub, marginTop: 10 }}>
                Waiting for {nameForKey(validSession.turn)}…
              </p>
            </div>
          )}
          {takenThumbs.length > 0 && (
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 16 }}>
              {takenThumbs.map((src, i) => (
                <img key={i} src={src} alt="" style={{ aspectRatio: '4/3', objectFit: 'cover', borderRadius: 8, border: `2px solid ${C.line}`, filter: (PHOTO_FILTERS.find(f => f.key === validSession.filter) || PHOTO_FILTERS[0]).css }} />
              ))}
            </div>
          )}
        </div>
      )}

      {active && takenThumbs.length >= 6 && (
        <div style={{ padding: '20px 10px', color: C.sub, fontFamily: "'Patrick Hand', cursive", fontSize: 15 }}>Finishing up your strip…</div>
      )}

      {validSession && validSession.status === 'complete' && (
        <div className="fade-up">
          <div style={{ fontFamily: 'Caveat', fontSize: 22, fontWeight: 700, color: C.accentDark, marginBottom: 10 }}>
            All done! Saved to your Photo Wall 🎉
          </div>
          {validSession.stripUrl && (
            <img src={validSession.stripUrl} alt="" style={{ maxWidth: 260, borderRadius: 10, border: `3px solid ${C.ink}`, transform: 'rotate(-1deg)', boxShadow: '2px 5px 10px rgba(58,46,40,0.2)' }} />
          )}
          <div style={{ marginTop: 16 }}>
            <Btn variant="accent" onClick={startSession} rot={1}>Start a new session</Btn>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================= NOTEBOOK TABS */
const TABS = [
  { key: 'home', icon: 'heart', label: 'Home', bg: '#FFD9E6' },
  { key: 'notes', icon: 'envelope', label: 'Notes', bg: '#FFF2A8' },
  { key: 'together', icon: 'check', label: 'Together', bg: '#D9F0CC' },
  { key: 'plans', icon: 'calendar', label: 'Plans', bg: '#F3E3CE' }
];
function NotebookTabs({ active, onChange }) {
  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 30,
      display: 'flex', justifyContent: 'center', gap: 6, padding: '0 10px',
      pointerEvents: 'none'
    }}>
      <div style={{ display: 'flex', gap: 6, pointerEvents: 'auto', maxWidth: 640, width: '100%', justifyContent: 'center' }}>
        {TABS.map((t, i) => {
          const isActive = active === i;
          return (
            <button key={t.key} onClick={() => onChange(i)} className="tab-btn press" style={{

              transform: `translateY(${isActive ? 0 : 8}px) rotate(${(i % 2 ? 1 : -1) * 0.8}deg)`,
              boxShadow: isActive ? '0 -3px 10px rgba(58,46,40,0.18)' : '0 -1px 4px rgba(58,46,40,0.1)',

/* ============================================================= APP */
const DEFAULT_STATE_EXTRA = { plans: [], status: {}, statusLog: {} };

function App() {
  const [loading, setLoading] = useState(true);
  const [config, setConfig] = useState(DEFAULT_CONFIG);
  const [photos, setPhotos] = useState([]);
  const [tasksData, setTasksData] = useState(DEFAULT_TASKS);
  const [notes, setNotes] = useState([]);
  const [plans, setPlans] = useState([]);
  const [status, setStatus] = useState({});
  const [statusLog, setStatusLog] = useState({});
  const [rewards, setRewards] = useState({ points: {}, spins: {}, options: DEFAULT_REWARD_OPTIONS.slice(), log: [] });
  const skipSaveRef = useRef(false);
  const [authedUser, setAuthedUser] = useState(null);
  const [showWelcome, setShowWelcome] = useState(false);
  const [showPhotobooth, setShowPhotobooth] = useState(false);
  const [showTurnPhotobooth, setShowTurnPhotobooth] = useState(false);
  const [showQuickCamera, setShowQuickCamera] = useState(false);
  const [tab, setTab] = useState(0);

  useEffect(() => {
    (async () => {
      const state = await loadState();
      if (state) {
        setConfig(state.config || DEFAULT_CONFIG);
        setTasksData(mergeTasks(state.tasks));
        setNotes(state.notes || []);
        setPlans(state.plans || []);
        setStatus(state.status || {});
        setStatusLog(state.statusLog || {});
        setRewards(state.rewards || { points: {}, spins: {}, options: DEFAULT_REWARD_OPTIONS.slice(), log: [] });
      }
      // Photos live in their own Firestore collection (one small doc per photo) so they
      // never bump into the 1MiB single-document cap the way a shared array would.
      const cloudPhotos = await fetchPhotos();
      if (cloudPhotos && cloudPhotos.length) {
        setPhotos(cloudPhotos);
      } else if (state && state.photos && state.photos.length) {
        // One-time migration: legacy photos were stored inline in appState.photos.
        // Move each into its own document, then use the freshly created ids.
        const migrated = [];
        for (const p of state.photos) {
          const id = await createPhotoDoc(p);
          migrated.push({ ...p, id: id || uid() });
        }
        setPhotos(migrated);
      } else if (state && state.photos) {
        setPhotos(state.photos);
      }
      setLoading(false);
    })();
  }, []);

  useEffect(() => {
    if (loading) return;
    if (skipSaveRef.current) { skipSaveRef.current = false; return; }
    saveState({ config, tasks: tasksData, notes, plans, status, statusLog, rewards, updatedAt: Date.now() });
  }, [config, tasksData, notes, plans, status, statusLog, rewards]);

  // Live-ish sync: poll the shared doc every ~4.5s so statuses/notes/tasks/rewards made on
  // one phone show up on the other without a manual refresh. Deliberately NOT polling the
  // photos collection here — listing it costs one read per photo, every poll, so it would
  // burn through the free daily read quota fast as the photo count grows. Photos still load
  // fresh each time the app opens; just not live tick-to-tick.
  const latestRef = useRef({});
  useEffect(() => { latestRef.current = { config, tasksData, notes, plans, status, statusLog, rewards }; });
  useEffect(() => {
    if (loading) return;
    const poll = async () => {
      const state = await loadState();
      if (!state) return;
      const cur = latestRef.current;
      let anyChanged = false;
      const maybeSet = (setter, remoteVal, curVal) => {
        if (remoteVal === undefined) return;
        if (JSON.stringify(remoteVal) !== JSON.stringify(curVal)) { anyChanged = true; setter(remoteVal); }
      };
      maybeSet(setConfig, state.config || DEFAULT_CONFIG, cur.config);
      maybeSet(setTasksData, mergeTasks(state.tasks), cur.tasksData);
      maybeSet(setNotes, state.notes || [], cur.notes);
      maybeSet(setPlans, state.plans || [], cur.plans);
      maybeSet(setStatus, state.status || {}, cur.status);
      maybeSet(setStatusLog, state.statusLog || {}, cur.statusLog);
      maybeSet(setRewards, state.rewards || { points: {}, spins: {}, options: DEFAULT_REWARD_OPTIONS.slice(), log: [] }, cur.rewards);
      if (anyChanged) skipSaveRef.current = true;
    };
    const t = setInterval(poll, 4500);
    return () => clearInterval(t);
  }, [loading]);

  const addPhoto = async p => {
    const tempId = uid();
    setPhotos(prev => [{ id: tempId, ...p }, ...prev]);
    const realId = await createPhotoDoc(p);
    if (realId) setPhotos(prev => prev.map(x => x.id === tempId ? { ...x, id: realId } : x));
  };
  const updatePhoto = (id, patch) => {
    setPhotos(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
    patchPhotoDoc(id, patch);
  };
  const addNote = n => setNotes(prev => [...prev, n]);
  const removeNote = id => setNotes(prev => prev.filter(n => n.id !== id));

  if (loading) {
    return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><PencilHeartLoader /></div>;
  }
  if (!config.setupDone) {
    return <SetupScreen onDone={c => { setConfig(c); setAuthedUser(c.nameA); setShowWelcome(true); }} />;
  }
  if (!authedUser) {
    return <LoginScreen config={config} onLogin={name => { setAuthedUser(name); setShowWelcome(true); }} />;
  }
  if (showWelcome) {
    return <WelcomeOverlay name={authedUser} onDone={() => setShowWelcome(false)} />;
  }

  const pages = [
    <HomePage key="home" config={config} photos={photos} addPhoto={addPhoto} updatePhoto={updatePhoto} tasksData={tasksData} activeUser={authedUser} plans={plans}
      status={status} setStatus={setStatus} statusLog={statusLog} setStatusLog={setStatusLog} goTo={setTab} openBooth={() => setShowPhotobooth(true)} openTurnBooth={() => setShowTurnPhotobooth(true)} openQuickCamera={() => setShowQuickCamera(true)} onSignOut={() => setAuthedUser(null)} />,
    <NotesPage key="notes" notes={notes} addNote={addNote} removeNote={removeNote} activeUser={authedUser} />,
    <TogetherPage key="together" tasksData={tasksData} setTasksData={setTasksData} activeUser={authedUser} rewards={rewards} setRewards={setRewards} />,
    <PlansPage key="plans" plans={plans} setPlans={setPlans} config={config} activeUser={authedUser} />
  ];

  return (
    <div style={{ minHeight: '100vh', background: C.bg, position: 'relative', overflowX: 'hidden' }}>
      <AmbientBackground />
      <AddToHomeBanner />
      <div style={{ position: 'relative', zIndex: 1, overflowX: 'hidden' }}>
        <div style={{ display: 'flex', width: `${TABS.length * 100}%`, transform: `translateX(-${tab * (100 / TABS.length)}%)`, transition: 'transform 0.55s cubic-bezier(.4,0,.2,1)' }}>
          {pages.map((p, i) => (
            <div key={i} style={{ width: `${100 / TABS.length}%`, minHeight: '100vh', paddingBottom: 90 }}>{p}</div>
          ))}
        </div>
      </div>
      <NotebookTabs active={tab} onChange={setTab} />

      {showPhotobooth && (
        <div className="fade-in" onClick={() => setShowPhotobooth(false)} style={{
          position: 'fixed', inset: 0, background: 'rgba(58,46,40,0.3)', zIndex: 55,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20
        }}>
          <div onClick={e => e.stopPropagation()} className="hand-tilt" style={{
            background: C.paper, borderRadius: '22px 10px 22px 10px/10px 22px 10px 22px', padding: 20, maxWidth: 420, width: '100%',
            border: `2px solid ${C.ink}`, boxShadow: '5px 6px 0 rgba(58,46,40,0.15)', position: 'relative', transform: 'rotate(-0.6deg)'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <h3 style={{ fontFamily: 'Caveat', fontSize: 22, fontWeight: 700, margin: 0 }}><Doodle type="photobooth" size={20} inline stroke={C.ink} /> Photobooth</h3>
              <button onClick={() => setShowPhotobooth(false)} className="press" style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.sub, fontSize: 18 }}>✕</button>
            </div>
            <Photobooth addPhoto={addPhoto} onClose={() => setShowPhotobooth(false)} />
          </div>
        </div>
      )}

      {showTurnPhotobooth && (
        <div className="fade-in" onClick={() => setShowTurnPhotobooth(false)} style={{
          position: 'fixed', inset: 0, background: 'rgba(58,46,40,0.3)', zIndex: 55,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20
        }}>
          <div onClick={e => e.stopPropagation()} style={{ background: C.paper, borderRadius: 20, padding: 20, maxWidth: 380, width: '100%', boxShadow: '0 20px 50px rgba(0,0,0,0.25)', maxHeight: '90vh', overflowY: 'auto' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <h3 style={{ fontFamily: 'Caveat', fontSize: 22, fontWeight: 700, margin: 0 }}><Doodle type="star" size={18} inline stroke={C.ink} /> Together Photobooth</h3>
              <button onClick={() => setShowTurnPhotobooth(false)} className="press" style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.sub, fontSize: 18 }}>✕</button>
            </div>
            <TurnPhotobooth activeUser={authedUser} config={config} addPhoto={addPhoto} onClose={() => setShowTurnPhotobooth(false)} />
          </div>
        </div>
      )}

      {showQuickCamera && (
        <div className="fade-in" onClick={() => setShowQuickCamera(false)} style={{
          position: 'fixed', inset: 0, background: 'rgba(58,46,40,0.3)', zIndex: 55,
          display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20
        }}>
          <div onClick={e => e.stopPropagation()} className="hand-tilt" style={{
            background: C.paper, borderRadius: '22px 10px 22px 10px/10px 22px 10px 22px', padding: 20, maxWidth: 420, width: '100%',
            border: `2px solid ${C.ink}`, boxShadow: '5px 6px 0 rgba(58,46,40,0.15)', position: 'relative', transform: 'rotate(0.6deg)'
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
              <h3 style={{ fontFamily: 'Caveat', fontSize: 22, fontWeight: 700, margin: 0 }}><Doodle type="camera" size={20} inline stroke={C.ink} /> Take Photo</h3>
              <button onClick={() => setShowQuickCamera(false)} className="press" style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.sub, fontSize: 18 }}>✕</button>
            </div>
            <QuickCamera addPhoto={addPhoto} onClose={() => setShowQuickCamera(false)} />
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================= GOOGLE AUTH GATE */
function GoogleSignInScreen() {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState('');
  const go = async () => {
    setBusy(true); setErr('');
    try {
      await signInWithGoogle();
    } catch (e) {
      console.error('signInWithGoogle failed', e);
      const code = e && e.code;
      // Popups are unreliable on mobile browsers and don't work at all in iOS
      // "Add to Home Screen" standalone mode — fall back to a full-page redirect.
      if (code === 'auth/popup-blocked' || code === 'auth/operation-not-supported-in-this-environment' || code === 'auth/popup-closed-by-user') {
        try { await fbAuth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()); return; }
        catch (e2) { console.error('signInWithRedirect fallback failed', e2); setErr('(' + ((e2 && e2.code) || 'unknown') + ') ' + ((e2 && e2.message) || 'Sign-in failed.')); }
      } else {
        setErr('(' + (code || 'unknown') + ') ' + ((e && e.message) || 'Sign-in failed.'));
      }
    }
    setBusy(false);
  };
  // If we got bounced back here after a redirect sign-in, surface any error from that flow too.
  useEffect(() => {
    fbAuth.getRedirectResult().catch(e => {
      console.error('getRedirectResult failed', e);
      setErr('(' + ((e && e.code) || 'unknown') + ') ' + ((e && e.message) || 'Sign-in failed.'));
    });
  }, []);
  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, position: 'relative', overflow: 'hidden', background: '#EFE0C4' }}>
      <LoginBackgroundWords />
      <div className="fade-up" style={{ maxWidth: 360, width: '100%', position: 'relative', zIndex: 1, textAlign: 'center' }}>
        <Doodle type="heart" size={30} inline />
        <h1 style={{ fontFamily: 'Caveat', fontSize: 32, fontWeight: 700, margin: '4px 0 18px', color: C.ink }}>Us</h1>
        <Paper rotate={-0.6} style={{ padding: 24 }}>
          <p style={{ margin: '0 0 16px', color: C.sub, fontSize: 15 }}>Sign in to continue</p>
          <Btn variant="accent" onClick={go} disabled={busy} style={{ width: '100%', padding: '13px 0' }} rot={0}>
            {busy ? 'Signing in\u2026' : 'Sign in with Google'}
          </Btn>
          {err && <div style={{ fontSize: 13, color: '#B5533F', marginTop: 10, wordBreak: 'break-word' }}>{err}</div>}
        </Paper>
      </div>
    </div>
  );
}
function NotAuthorizedScreen({ email }) {
  return (
    <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24, textAlign: 'center' }}>
      <div>
        <p style={{ fontSize: 17, color: C.ink, marginBottom: 14 }}>{email} isn\u2019t invited to this one \ud83d\udc8c</p>
        <Btn variant="ghost" onClick={() => signOutOfGoogle()} rot={0}>Try a different account</Btn>
      </div>
    </div>
  );
}
function AuthGate() {
  const [status, setStatus] = useState('loading'); // loading | signedOut | unauthorized | authorized
  const [email, setEmail] = useState('');
  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(user => {
      if (!user) { setStatus('signedOut'); return; }
      setEmail(user.email || '');
      setStatus(ALLOWED_EMAILS.includes(user.email) ? 'authorized' : 'unauthorized');
    });
    return () => unsub();
  }, []);
  if (status === 'loading') {
    return <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><PencilHeartLoader /></div>;
  }
  if (status === 'signedOut') return <GoogleSignInScreen />;
  if (status === 'unauthorized') return <NotAuthorizedScreen email={email} />;
  return <App />;
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  componentDidCatch(error) { console.error('CAUGHT RENDER ERROR:', error); }
  static getDerivedStateFromError(error) { return { error }; }
  render() {
    if (this.state.error) {
      return <div style={{ padding: 40, fontFamily: 'monospace', whiteSpace: 'pre-wrap', color: C.ink, background: C.bg }}>
        RENDER ERROR:{'\n'}{String(this.state.error && this.state.error.message)}
      </div>;
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><AuthGate /></ErrorBoundary>);

</script>
